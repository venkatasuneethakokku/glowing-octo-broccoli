<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>SHA Beauty Register</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="register.css">
</head>
<body>

<div class="container">

    <div class="row register-container">

        <!-- Image Section -->
        <div class="col-lg-6 d-none d-lg-block p-0">

            <img src="https://cdn.pixabay.com/photo/2026/03/23/10/07/bluext2-woman-10188193_1280.jpg"
                 class="img-fluid register-image"
                 alt="Beauty Model">

        </div>

        <!-- Form Section -->
        <div class="col-lg-6">

            <div class="register-card">

                <h2 class="fw-bold text-center mb-2">
                    Welcome Beauty Lover ✨
                </h2>

                <p class="text-center text-muted mb-4">
                    Create your account and start your beauty journey.
                </p>

                <form>

                    <div class="mb-3">
                        <label class="form-label">
                            Full Name
                        </label>

                        <input type="text"
                               class="form-control"
                               placeholder="Enter Full Name">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">
                            Email
                        </label>

                        <input type="email"
                               class="form-control"
                               placeholder="Enter Email">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">
                            Password
                        </label>

                        <input type="password"
                               class="form-control"
                               placeholder="Enter Password">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">
                            Confirm Password
                        </label>

                        <input type="password"
                               class="form-control"
                               placeholder="Confirm Password">
                    </div>

                    <div class="form-check mb-4">

                        <input class="form-check-input"
                               type="checkbox">

                        <label class="form-check-label">
                            I agree to the Terms & Conditions
                        </label>

                    </div>

                    <button class="btn btn-primary w-100">
                        Register
                    </button>

                    <p class="text-center mt-3">
                        Already have an account?
                        <a href="login.html">Login</a>
                    </p>


           
                </form>

            </div>

        </div>

    </div>

</div>

</body>
</html>
