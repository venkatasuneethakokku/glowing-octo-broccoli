<html>
<head>
<style>
.box{
    width:100px;
    height:100px;
    margin:10px;
    background:lightblue;
}

.static-box{
    position:static;
    top:50px;
    left:50px;
    background:orange;
}
</style>
</head>
<body>

<div class="box">Box 1</div>
<div class="box static-box">Box 2</div>
<div class="box">Box 3</div>

</body>
</html>
