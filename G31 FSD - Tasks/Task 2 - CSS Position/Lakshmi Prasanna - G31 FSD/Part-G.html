## Part G - Combined Application
25. Design a webpage that includes all 5 position values.
26. Ensure all five position values are used at least once.
27. Add comments in CSS explaining why each position type was chosen.
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Part G - Combined Application</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
    }
    /* Fixed - stays at top always */
    .fixed-header {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      background-color: darkblue;
      color: white;
      padding: 15px;
      text-align: center;
      z-index: 999;
    }
    /* Sticky - sticks when scrolled */
    .sticky-navbar {
      position: sticky;
      top: 50px;
      background-color: darkgreen;
      color: white;
      padding: 10px;
      text-align: center;
      z-index: 998;
    }
    .content {
      margin-top: 60px;
      padding: 20px;
    }
    /* Relative - banner shifted slightly */
    .relative-banner {
      position: relative;
      top: 10px;
      background-color: lightcoral;
      padding: 20px;
      text-align: center;
      font-size: 20px;
      margin: 20px 0;
    }
    /* Absolute - badge on product card */
    .product-card {
      position: relative;
      width: 200px;
      height: 200px;
      background-color: lightyellow;
      border: 2px solid gray;
      margin: 30px auto;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }
    .badge {
      position: absolute;
      top: -10px;
      right: -10px;
      background-color: red;
      color: white;
      border-radius: 50%;
      width: 35px;
      height: 35px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    /* Static - normal flow */
    .static-section {
      background-color: lightblue;
      padding: 20px;
      margin: 20px 0;
      font-size: 18px;
      text-align: center;
    }
    .section {
      height: 300px;
      background-color: lightgray;
      margin: 20px 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }
    /* Fixed - chat button */
    .chat-button {
      position: fixed;
      bottom: 30px;
      right: 30px;
      background-color: green;
      color: white;
      padding: 15px 20px;
      border-radius: 50px;
      font-size: 16px;
      z-index: 999;
    }
  </style>
</head>
<body>
  <div class="fixed-header">Fixed Header - Always On Top</div>
  <nav class="sticky-navbar">Sticky Navbar - Sticks When Scrolling</nav>
  <div class="content">
    <div class="relative-banner">Relative Banner - Shifted 10px Down</div>
    <div class="static-section">Static Section - Normal Document Flow</div>
    <div class="product-card">
      Product Card
      <div class="badge">3</div>
    </div>
    <div class="section">Section 1 - Scroll to test!</div>
    <div class="section">Section 2</div>
    <div class="section">Section 3</div>
  </div>
  <div class="chat-button">💬 Chat</div>
</body>
</html>
